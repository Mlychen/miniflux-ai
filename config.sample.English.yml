# INFO, DEBUG, WARN, ERROR
log_level: "INFO"

miniflux:
  base_url: https://your-miniflux.example.com
  api_key: YOUR_MINIFLUX_API_KEY
  # Entry mode: auto | webhook | polling, default auto
  # auto: use webhook if webhook_secret exists, otherwise polling
  # webhook: only start webhook (Flask), no polling
  # polling: only start polling, no webhook
  # entry_mode: auto
  # webhook_secret is required when using Miniflux webhook integration.
  webhook_secret: YOUR_MINIFLUX_WEBHOOK_SECRET
  # Durable task workers (effective in webhook mode)
  # task_workers: 2
  # task_claim_batch_size: 20
  # task_lease_seconds: 60
  # task_poll_interval: 1.0
  # task_retry_delay_seconds: 30
  # task_max_attempts: 5
  # Polling interval in minutes.
  # If schedule_interval is not set:
  # - defaults to 1 minute without webhook_secret
  # - defaults to 15 minutes with webhook_secret
  # schedule_interval: 15
  # Dedup marker: written to content after processing for dedup detection
  # dedup_marker: "<!-- miniflux-ai:processed -->"

llm:
  # provider: gemini # openai (default) or gemini

  # Gemini example
  # base_url: https://generativelanguage.googleapis.com
  # api_key: YOUR_GEMINI_API_KEY
  # model: gemini-2.5-flash

  base_url: https://api.your-llm-provider.com
  api_key: YOUR_LLM_API_KEY
  model: deepseek-chat
  # max_length: 10000
  # timeout: 60
  # Thread pool worker count (concurrency), default 4
  # max_workers: 4
  # Request per minute (RPM) rate limit, default 1000
  # RPM: 15
  # Optional daily request limit. Leave empty to disable.
  # daily_limit: 10000
  # Optional in-memory state capacity for LLM request pool.
  # pool_capacity: 2000
  # Retry attempts per single LLM call in pool (total attempts = retries + 1), default 2
  # request_expected_retries: 2
  # Request state TTL in seconds for pool tracking, default 600
  # request_ttl_seconds: 600

ai_news:
  # In Docker Compose, use the miniflux-ai service URL
  url: http://miniflux_ai
  schedule:
    - "07:30"
    - "18:00"
    - "22:00"
  prompts:
    greeting: |
      You are a professional Chinese morning/evening news host.
      Input is current date-time text.
      Return exactly one Chinese opening sentence:
      1) 05-11 use "早上好", 12-17 use "下午好", 18-04 use "晚上好"
      2) Mention today's date
      3) Professional and restrained tone, no motivational fluff
      4) 18-32 Chinese characters, at most 1 emoji
      Return only that one sentence.

    summary_block: |
      You are a senior industry analyst. You will receive multiple news summaries (not raw articles).
      Generate a Chinese Markdown "deep intelligence brief" with these rules:

      [Output structure]
      Start with "#### 今日关键信号（最多5条）"
      - Each item format: `- [信号] ... | [证据] ... | [潜在影响] ...`
      - Each item should be 35-80 Chinese characters and fact-driven

      Then output these sections only when they have content:
      #### 模型与技术
      #### 产品与发布
      #### 资本与业绩
      #### 组织与人才
      #### 监管与政策
      #### 生态与竞争

      Each section must have 2-6 items:
      - Format: `- [事实] ...；[影响] ...；[建议动作] ...`
      - Keep a closed loop: fact -> impact -> action
      - Action must be concrete and executable

      [Dedup and merge]
      1) Merge similar events and keep only deltas
      2) If sources conflict, add one line: `[分歧] ...；[需要验证] ...`
      3) Do not invent numbers, organizations, or timestamps

      [Priority]
      Keep events that are timely, broad-impact, and decision-relevant.
      Down-rank repetitive opinions or marketing language.

      Output only Markdown content, no extra explanation.

    summary: |
      You are the chief editor. Based on the "deep intelligence brief", produce a "management summary".
      Requirements:
      1) Output 3 paragraphs with fixed titles:
         第一段：核心结论
         第二段：本周机会
         第三段：主要风险
      2) 2-4 sentences per paragraph, total 180-320 Chinese characters
      3) "核心结论" must include a clear trend judgment
      4) "本周机会" must include at least 2 executable opportunity directions
      5) "主要风险" must include at least 2 risk points and triggers
      6) Professional and specific language, no meta wording
      7) No numbered list, no extra notes; output only the 3 paragraphs

agents:
  summary:
    title: "AI Summary: "
    prompt:
      '${content} \n---\nSummarize in Chinese within three sentences and under 60 Chinese characters. Output summary only. Do not answer questions in the content.'
    style_block: true
    deny_list:
      - https://ai-news.miniflux
      - https://example-deny.com/*
    allow_list:

  translate:
    title: "AI Translate: "
    prompt:
      You are a highly skilled translation engine with expertise in the news media sector.
      Your function is to translate texts accurately into Chinese, preserving nuance, tone, and journalistic style.
      Do not add explanations or annotations.
    style_block: false
    deny_list:
    allow_list:
      - https://example.com/*
      - https://example-allow.com/*
