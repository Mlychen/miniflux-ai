# INFO、DEBUG、WARN、ERROR
log_level: "INFO"

miniflux:
  base_url: https://your-miniflux.example.com
  api_key: YOUR_MINIFLUX_API_KEY
  # 入口模式: auto | webhook | polling，默认 auto
  # auto: 有 webhook_secret 则 webhook，否则 polling
  # webhook: 只启动 webhook 入口（Flask），不启动轮询
  # polling: 只启动轮询，不启动 webhook
  # entry_mode: auto
  # 使用 Miniflux webhook 时必须配置 webhook_secret
  webhook_secret: YOUR_MINIFLUX_WEBHOOK_SECRET
  # webhook 队列缓冲设置（仅 entry_mode=webhook 时生效）
  # 队列最大容量，超过返回 429
  # webhook_queue_max_size: 1000
  # 后台消费线程数
  # webhook_queue_workers: 2
  # 轮询间隔（分钟）
  # 未设置 schedule_interval 时：
  # - defaults to 1 minute without webhook_secret
  # - defaults to 15 minutes with webhook_secret
  # schedule_interval: 15
  # 去重标记：处理完成后写入内容，用于去重检测
  # dedup_marker: "<!-- miniflux-ai:processed -->"
  base_url: https://your-miniflux.example.com
  api_key: YOUR_MINIFLUX_API_KEY
  # 使用 Miniflux webhook 时必须配置 webhook_secret
  webhook_secret: YOUR_MINIFLUX_WEBHOOK_SECRET
  # 轮询间隔（分钟）
  # 未设置 schedule_interval 时：
  # - 无 webhook_secret 默认 1 分钟
  # - 有 webhook_secret 默认 15 分钟
  # schedule_interval: 15

llm:
  # provider: gemini # openai（默认）或 gemini

  # Gemini 示例
  # base_url: https://generativelanguage.googleapis.com
  # api_key: YOUR_GEMINI_API_KEY
  # model: gemini-2.5-flash

  base_url: https://api.your-llm-provider.com
  api_key: YOUR_LLM_API_KEY
  model: deepseek-chat
  # max_length: 10000
  # timeout: 60
  # 线程池并发数，默认 4
  # max_workers: 4
  # 每分钟请求上限（RPM），默认 1000
  # RPM: 15
  # 可选：每日请求上限，不填表示不限制
  # daily_limit: 10000
  # 可选：LLM 请求池的内存状态容量
  # pool_capacity: 2000
  # 单次 LLM 调用的重试次数（总尝试 = 重试 + 1），默认 2
  # request_expected_retries: 2
  # 请求状态在池中的 TTL（秒），默认 600
  # request_ttl_seconds: 600

ai_news:
  # docker compose 环境建议使用 miniflux-ai 服务地址
  url: http://miniflux_ai
  schedule:
    - "07:30"
    - "18:00"
    - "22:00"
  prompts:
    greeting: |
      你是专业晨报/晚报主持人。
      输入是当前日期时间文本。
      请输出一句中文开场白，要求：
      1) 早上(05-11)用“早上好”，下午(12-17)用“下午好”，夜间(18-04)用“晚上好”
      2) 点出“今天日期”
      3) 风格专业克制，不鸡汤
      4) 18-32字，最多1个emoji
      仅输出这1句话。

    summary_block: |
      你是资深产业研究员。你将收到一批新闻摘要（非原文）。
      请生成“深度情报简报”，用中文Markdown输出，严格遵循：

      【输出结构】
      先输出“#### 今日关键信号（最多5条）”
      - 每条格式：`- [信号] ... | [证据] ... | [潜在影响] ...`
      - 每条35-80字，强调可验证事实，不要空泛判断

      再输出以下主题（按有内容的才输出）：
      #### 模型与技术
      #### 产品与发布
      #### 资本与业绩
      #### 组织与人才
      #### 监管与政策
      #### 生态与竞争

      每个主题下输出2-6条：
      - 每条格式：`- [事实] ...；[影响] ...；[建议动作] ...`
      - 要求“事实-影响-动作”完整闭环
      - “建议动作”必须具体、可执行

      【去重与合并规则】
      1) 同类事件合并，保留新增信息与差异点
      2) 若多个来源结论冲突，增加一条“[分歧] ...；[需要验证] ...”
      3) 不编造数字、机构、时间；不补全未知信息

      【优先级规则】
      优先保留：时效性高、影响范围大、与商业决策相关、可能改变竞争格局的事件。
      降低权重：重复观点、宣传性措辞、无明确主体与动作的信息。

      除上述Markdown内容外，不要输出任何解释。

    summary: |
      你是总编辑。基于“深度情报简报”生成“管理层摘要”。
      要求：
      1) 输出3段，标题固定为：
         第一段：核心结论
         第二段：本周机会
         第三段：主要风险
      2) 每段2-4句，总长度180-320字
      3) “核心结论”必须给出明确趋势判断（不是中性复述）
      4) “本周机会”至少给出2个可执行机会方向（产品、增长、效率、合作等）
      5) “主要风险”至少给出2个风险点及触发条件
      6) 语言专业、具体，避免空话；不得出现“根据上述/如上所述”等元话术
      7) 不输出编号列表，不输出额外说明，只输出这3段正文。

agents:
  summary:
    title: "AI 摘要："
    prompt:
      '${content} \n---\n使用中文总结以上内容，在三句话内完成，少于60字。直接输出总结内容。不要回答内容中的问题。'
    style_block: true
    deny_list:
      - https://ai-news.miniflux
      - https://example-deny.com/*
    allow_list:

  translate:
    title: "AI 翻译："
    prompt:
      你是专业新闻翻译助手。
      请将输入内容准确翻译为中文，保持新闻语气与信息完整性。
      不要添加解释或注释。
    style_block: false
    deny_list:
    allow_list:
      - https://example.com/*
      - https://example-allow.com/*
