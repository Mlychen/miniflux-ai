services:
  miniflux:
    ports: []
    expose:
      - "8080"

  miniflux_ai:
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    depends_on:
      - miniflux
      - miniflux_ai
    ports:
      - "80:80"
    volumes:
      - ./nginx/miniflux-ai.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
